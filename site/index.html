<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Bawarchi Recipe Collection</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <h1>The Bawarchi Recipe Collection</h1>
  <p class="tagline">Home recipes sent in by readers of <em>bawarchi.com</em>, c.&nbsp;2001&ndash;2008,
     recovered from the Internet&nbsp;Archive.</p>
  <input id="q" type="search" placeholder="Search recipes, ingredients, cooks…" autofocus autocomplete="off">
  <div id="filters">
    <label class="veg-toggle"><input type="checkbox" id="vegOnly"> Vegetarian only</label>
    <div id="chips"></div>
  </div>
  <p id="count"></p>
</header>
<main>
  <ul id="results"></ul>
  <article id="recipe" hidden></article>
</main>
<footer>Recovered from the Wayback Machine · recipes are readers' own, untested.</footer>
<script src="app.js"></script>
</body>
</html>
